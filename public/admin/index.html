<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Заявки — Лакшми</title>
  <style>
    :root {
      --bg: #EFEDE9;
      --card: rgba(255,255,255,0.76);
      --text: #4D1812;
      --muted: #765953;
      --gold: #A4732C;
      --line: rgba(77, 24, 18, 0.12);
      --shadow: 0 18px 50px rgba(77, 24, 18, 0.10);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --container: min(1440px, calc(100% - 40px));
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at 10% 10%, rgba(164, 115, 44, 0.18), transparent 0 18%),
        radial-gradient(circle at 86% 0%, rgba(77, 24, 18, 0.12), transparent 0 18%),
        linear-gradient(180deg, #F4F1EC, #EFEDE9 52%, #FBFAF8 100%);
      min-height: 100vh;
    }
    .container { width: var(--container); margin: 0 auto; }
    .topbar {
      position: sticky;
      top: 0;
      backdrop-filter: blur(12px);
      background: rgba(249, 240, 233, 0.74);
      border-bottom: 1px solid var(--line);
      z-index: 20;
    }
    .topbar__inner {
      min-height: 82px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }
    .brand h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(28px, 3vw, 38px);
      line-height: 1;
    }
    .brand p { margin: 6px 0 0; color: var(--muted); }
    .btn, .chip {
      border: 1px solid transparent;
      border-radius: 999px;
      min-height: 46px;
      padding: 0 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: transform .18s ease, box-shadow .18s ease, opacity .18s ease;
    }
    .btn:hover, .chip:hover { transform: translateY(-1px); }
    .btn--gold { background: linear-gradient(135deg, #A4732C, #C79249); color: #4D1812; }
    .btn--secondary { background: rgba(255,255,255,0.72); color: var(--text); border-color: var(--line); }
    .btn--danger { background: rgba(77,24,18,0.08); color: var(--text); border-color: rgba(77,24,18,0.18); }
    .hero { padding: 32px 0 18px; }
    .grid { display: grid; grid-template-columns: 320px minmax(0, 1fr); gap: 22px; }
    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 24px;
      backdrop-filter: blur(10px);
    }
    .stats { display:grid; gap:14px; }
    .stat {
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 18px;
    }
    .stat strong { display:block; font-size:28px; font-family: Georgia, serif; margin-bottom:6px; }
    .filters { display:flex; flex-wrap:wrap; gap:10px; margin-top:18px; }
    .chip { background: rgba(255,255,255,0.7); color: var(--text); border-color: var(--line); }
    .chip.is-active { background: rgba(164,115,44,0.18); border-color: rgba(164,115,44,0.3); }
    .list { display:grid; gap:18px; }
    .lead-card {
      background: rgba(255,255,255,0.78);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 24px;
    }
    .lead-top {
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:flex-start;
      margin-bottom:16px;
      flex-wrap:wrap;
    }
    .lead-top h3 { margin:0 0 8px; font-size:24px; font-family: Georgia, serif; }
    .muted { color: var(--muted); }
    .meta { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; margin: 16px 0; }
    .meta-item {
      background: rgba(239, 237, 233, 0.7);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 14px;
    }
    .meta-item strong { display:block; font-size:13px; text-transform:uppercase; letter-spacing:.08em; color: var(--muted); margin-bottom:6px; }
    .toolbar { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    select, textarea {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--line);
      padding: 12px 14px;
      font: inherit;
      color: var(--text);
      background: rgba(255,255,255,0.8);
    }
    textarea { min-height: 110px; resize: vertical; }
    .row { display:grid; grid-template-columns: 220px minmax(0,1fr) 250px; gap:12px; align-items:start; margin-top:16px; }
    .card-actions { display:grid; gap:10px; }
    .card-actions .btn { width: 100%; }
    .badge {
      display:inline-flex; align-items:center; min-height: 34px; padding: 0 12px; border-radius:999px; font-weight:700; font-size:13px;
      background: rgba(255,255,255,0.72); border: 1px solid var(--line);
    }
    .badge.new { background: rgba(164,115,44,0.18); }
    .badge.in_progress { background: rgba(77,24,18,0.10); }
    .badge.done { background: rgba(89,133,93,0.16); }
    .badge.archived { background: rgba(135, 117, 96, 0.16); }
    .badge.deleted { background: rgba(77,24,18,0.14); }
    .statusline { margin-top: 12px; font-size:14px; color: var(--muted); min-height: 20px; }
    .empty { text-align:center; padding:48px 20px; color: var(--muted); }
    .warning-note {
      margin-top: 14px;
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
    }
    @media (max-width: 1180px) {
      .row { grid-template-columns: 1fr; }
    }
    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
      .meta { grid-template-columns: 1fr; }
    }
  
    .attachment-box { margin-top: 14px; padding: 14px 16px; border-radius: 18px; border: 1px solid rgba(77,24,18,.08); background: rgba(248,244,240,.72); }
    .attachment-title { font-size: 13px; font-weight: 700; color: #4D1812; margin-bottom: 10px; }
    .attachment-list { display: grid; gap: 8px; }
    .attachment-link {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 10px 12px; border-radius: 14px; text-decoration: none; color: #4D1812;
      background: rgba(255,255,255,.88); border: 1px solid rgba(77,24,18,.08);
    }
    .attachment-link small { color: #7E5F57; font-size: 12px; }

  </style>
</head>
<body>
  <div class="topbar">
    <div class="container topbar__inner">
      <div class="brand">
        <h1>Лакшми — заявки</h1>
        <p>Почта, Telegram и сохранение обращений в SQLite</p>
      </div>
      <div class="toolbar">
        <a class="btn btn--secondary" href="/" target="_blank" rel="noopener">Открыть сайт</a>
        <button class="btn btn--gold" id="logoutBtn">Выйти</button>
      </div>
    </div>
  </div>

  <main class="container hero">
    <div class="grid">
      <aside class="panel">
        <div class="stats" id="stats"></div>
        <div class="filters" id="filters">
          <button class="chip is-active" data-status="all">Все</button>
          <button class="chip" data-status="new">Новые</button>
          <button class="chip" data-status="in_progress">В работе</button>
          <button class="chip" data-status="done">Завершённые</button>
          <button class="chip" data-status="archived">Архив</button>
          <button class="chip" data-status="deleted">Удалённые</button>
        </div>
        <div class="warning-note">
          Удаление здесь двухступенчатое: сначала заявка уходит в «Удалённые», а уже оттуда её можно стереть навсегда или восстановить.
        </div>
      </aside>

      <section>
        <div class="list" id="leadList"></div>
      </section>
    </div>
  </main>

  <script>
    const leadList = document.getElementById('leadList');
    const statsEl = document.getElementById('stats');
    const filters = document.getElementById('filters');
    const logoutBtn = document.getElementById('logoutBtn');
    let currentStatus = 'all';

    const statusMap = {
      new: 'Новая',
      in_progress: 'В работе',
      done: 'Завершена',
      archived: 'В архиве',
      deleted: 'Удалена'
    };

    const formatDate = (iso) => new Date(iso).toLocaleString('ru-RU');

    function renderStats(stats) {
      statsEl.innerHTML = `
        <div class="stat"><strong>${stats.all}</strong><span>Активные заявки</span></div>
        <div class="stat"><strong>${stats.new}</strong><span>Новые</span></div>
        <div class="stat"><strong>${stats.in_progress}</strong><span>В работе</span></div>
        <div class="stat"><strong>${stats.done}</strong><span>Завершённые</span></div>
        <div class="stat"><strong>${stats.archived}</strong><span>В архиве</span></div>
        <div class="stat"><strong>${stats.deleted}</strong><span>Удалённые</span></div>
      `;
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }


    function formatBytes(bytes) {
      const value = Number(bytes || 0);
      if (!value) return '0 Б';
      if (value < 1024) return `${value} Б`;
      if (value < 1024 * 1024) return `${(value / 1024).toFixed(1)} КБ`;
      return `${(value / (1024 * 1024)).toFixed(1)} МБ`;
    }

    function renderAttachments(lead) {
      if (!lead.attachments || !lead.attachments.length) return '';
      return `
        <div class="attachment-box">
          <div class="attachment-title">Файлы по заявке (${lead.attachments.length})</div>
          <div class="attachment-list">
            ${lead.attachments.map((file) => `
              <a class="attachment-link" href="${encodeURI(file.download_url)}" target="_blank" rel="noopener noreferrer">
                <span>${escapeHtml(file.original_name)}</span>
                <small>${formatBytes(file.size_bytes)}</small>
              </a>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderActionButtons(lead) {
      if (lead.status === 'deleted') {
        return `
          <button class="btn btn--secondary restore-btn">Восстановить</button>
          <button class="btn btn--danger hard-delete-btn">Удалить навсегда</button>
        `;
      }

      return `
        <button class="btn btn--gold save-btn">Сохранить</button>
        <button class="btn btn--secondary archive-btn">В архив</button>
        <button class="btn btn--danger soft-delete-btn">Мягко удалить</button>
      `;
    }

    function renderLeads(leads) {
      if (!leads.length) {
        leadList.innerHTML = '<div class="panel empty">Заявок в этом разделе пока нет.</div>';
        return;
      }

      leadList.innerHTML = leads.map((lead) => `
        <article class="lead-card" data-id="${lead.id}">
          <div class="lead-top">
            <div>
              <h3>${escapeHtml(lead.name)}</h3>
              <div class="muted">${escapeHtml(lead.phone)}</div>
            </div>
            <span class="badge ${lead.status}">${statusMap[lead.status] || lead.status}</span>
          </div>

          <div class="meta">
            <div class="meta-item"><strong>Услуга</strong>${escapeHtml(lead.service)}</div>
            <div class="meta-item"><strong>Дата</strong>${formatDate(lead.created_at)}</div>
            <div class="meta-item"><strong>Источник</strong>${escapeHtml(lead.source)}</div>
            <div class="meta-item"><strong>Уведомления</strong>${lead.email_sent ? 'Почта' : 'Почта не настроена'} · ${lead.telegram_sent ? 'Telegram' : 'Telegram не настроен'}</div>
          </div>

          <div class="meta-item"><strong>Комментарий клиента</strong>${escapeHtml(lead.message || 'Комментарий не указан')}</div>
          ${renderAttachments(lead)}

          <div class="row">
            <div>
              <label class="muted">Статус</label>
              <select class="status-select" ${lead.status === 'deleted' ? 'disabled' : ''}>
                <option value="new" ${lead.status === 'new' ? 'selected' : ''}>Новая</option>
                <option value="in_progress" ${lead.status === 'in_progress' ? 'selected' : ''}>В работе</option>
                <option value="done" ${lead.status === 'done' ? 'selected' : ''}>Завершена</option>
                <option value="archived" ${lead.status === 'archived' ? 'selected' : ''}>Архив</option>
              </select>
            </div>
            <div>
              <label class="muted">Комментарий менеджера</label>
              <textarea class="manager-note" placeholder="Например: созвонились, запросили документы, назначили выезд">${escapeHtml(lead.manager_note || '')}</textarea>
            </div>
            <div class="card-actions">
              <label class="muted">Действия</label>
              ${renderActionButtons(lead)}
            </div>
          </div>

          <div class="statusline"></div>
        </article>
      `).join('');
    }

    async function loadLeads() {
      const response = await fetch(`/api/admin/leads?status=${encodeURIComponent(currentStatus)}`);
      if (response.status === 401) {
        window.location.href = '/admin/login';
        return;
      }
      const result = await response.json();
      if (!response.ok || !result.ok) {
        throw new Error(result.message || 'Не удалось загрузить заявки.');
      }
      renderStats(result.stats);
      renderLeads(result.leads);
    }

    filters.addEventListener('click', async (e) => {
      const btn = e.target.closest('[data-status]');
      if (!btn) return;
      currentStatus = btn.dataset.status;
      document.querySelectorAll('#filters .chip').forEach((item) => item.classList.remove('is-active'));
      btn.classList.add('is-active');
      await loadLeads();
    });

    async function handleCardAction(card, action) {
      const id = card.dataset.id;
      const status = card.querySelector('.status-select')?.value || 'archived';
      const managerNote = card.querySelector('.manager-note')?.value || '';
      const statusLine = card.querySelector('.statusline');
      const buttons = card.querySelectorAll('button');
      buttons.forEach((button) => button.disabled = true);

      try {
        let url = `/api/admin/leads/${encodeURIComponent(id)}`;
        let options = {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status, managerNote })
        };

        if (action === 'archive') {
          url = `/api/admin/leads/${encodeURIComponent(id)}/archive`;
          options = {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ managerNote })
          };
          statusLine.textContent = 'Переносим заявку в архив…';
        } else if (action === 'soft-delete') {
          const confirmed = window.confirm('Переместить заявку в удалённые? Её можно будет восстановить позже.');
          if (!confirmed) return;
          url = `/api/admin/leads/${encodeURIComponent(id)}/soft-delete`;
          options = { method: 'POST' };
          statusLine.textContent = 'Переносим заявку в удалённые…';
        } else if (action === 'restore') {
          url = `/api/admin/leads/${encodeURIComponent(id)}/restore`;
          options = { method: 'POST' };
          statusLine.textContent = 'Восстанавливаем заявку…';
        } else if (action === 'hard-delete') {
          const confirmed = window.confirm('Удалить заявку навсегда? Это действие нельзя отменить.');
          if (!confirmed) return;
          url = `/api/admin/leads/${encodeURIComponent(id)}`;
          options = { method: 'DELETE' };
          statusLine.textContent = 'Удаляем заявку навсегда…';
        } else {
          statusLine.textContent = 'Сохраняем изменения…';
        }

        const response = await fetch(url, options);
        const result = await response.json();
        if (!response.ok || !result.ok) {
          throw new Error(result.message || 'Не удалось выполнить действие.');
        }
        statusLine.textContent = result.message || 'Готово.';
        await loadLeads();
      } catch (error) {
        statusLine.textContent = error.message || 'Ошибка.';
      } finally {
        buttons.forEach((button) => button.disabled = false);
      }
    }

    leadList.addEventListener('click', async (e) => {
      const card = e.target.closest('.lead-card');
      if (!card) return;
      if (e.target.closest('.save-btn')) return handleCardAction(card, 'save');
      if (e.target.closest('.archive-btn')) return handleCardAction(card, 'archive');
      if (e.target.closest('.soft-delete-btn')) return handleCardAction(card, 'soft-delete');
      if (e.target.closest('.restore-btn')) return handleCardAction(card, 'restore');
      if (e.target.closest('.hard-delete-btn')) return handleCardAction(card, 'hard-delete');
    });

    logoutBtn.addEventListener('click', async () => {
      await fetch('/api/admin/logout', { method: 'POST' });
      window.location.href = '/admin/login';
    });

    loadLeads().catch((error) => {
      leadList.innerHTML = `<div class="panel empty">${error.message}</div>`;
    });
  </script>
</body>
</html>
