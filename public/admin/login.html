<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход в админ-панель — Лакшми</title>
  <style>
    :root {
      --bg: #EFEDE9;
      --card: rgba(255,255,255,0.72);
      --text: #4D1812;
      --muted: #765953;
      --gold: #A4732C;
      --line: rgba(77, 24, 18, 0.12);
      --shadow: 0 20px 60px rgba(77, 24, 18, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 15% 15%, rgba(164, 115, 44, 0.2), transparent 0 24%),
        radial-gradient(circle at 85% 8%, rgba(77, 24, 18, 0.12), transparent 0 22%),
        linear-gradient(180deg, #F4F1EC, #EFEDE9 52%, #FBFAF8 100%);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      padding: 24px;
    }
    .card {
      width: min(100%, 480px);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 32px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }
    h1 {
      margin: 0 0 10px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(34px, 5vw, 48px);
      line-height: 1;
    }
    p { margin: 0 0 24px; color: var(--muted); line-height: 1.6; }
    .field { margin-bottom: 16px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; }
    input {
      width: 100%;
      min-height: 52px;
      border-radius: 16px;
      border: 1px solid var(--line);
      padding: 0 16px;
      font-size: 15px;
      background: rgba(255,255,255,0.78);
      color: var(--text);
    }
    .btn {
      width: 100%;
      min-height: 54px;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      background: linear-gradient(135deg, #A4732C, #C79249);
      color: #4D1812;
      font-size: 15px;
      font-weight: 700;
      box-shadow: 0 14px 30px rgba(164,115,44,0.25);
    }
    .status {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 14px;
      font-size: 14px;
      display: none;
    }
    .status.show { display: block; }
    .status.error { background: rgba(139, 48, 35, 0.08); color: #7d2418; }
    .meta { display:flex; justify-content:space-between; gap:12px; margin-top:24px; font-size:14px; color:var(--muted); }
    .meta a { color: var(--text); text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Админ-панель</h1>
    <p>Войдите, чтобы видеть все заявки с главной страницы, статусы обработки и комментарии менеджера.</p>
    <form id="loginForm">
      <div class="field">
        <label for="login">Логин</label>
        <input id="login" name="login" type="text" value="admin" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Пароль</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button class="btn" type="submit">Войти</button>
      <div class="status" id="status"></div>
    </form>
    <div class="meta">
      <a href="/">← Вернуться на сайт</a>
      <span>Лакшми</span>
    </div>
  </div>
  <script>
    const form = document.getElementById('loginForm');
    const statusEl = document.getElementById('status');

    const setStatus = (message = '', type = 'error') => {
      statusEl.textContent = message;
      statusEl.className = `status show ${type}`;
    };

    fetch('/api/admin/me').then(r => r.json()).then(data => {
      if (data.ok) {
        window.location.href = '/admin';
      }
    }).catch(() => {});

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = Object.fromEntries(new FormData(form).entries());
      try {
        const response = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (!response.ok || !result.ok) {
          throw new Error(result.message || 'Не удалось войти.');
        }
        window.location.href = '/admin';
      } catch (error) {
        setStatus(error.message || 'Ошибка входа.');
      }
    });
  </script>
</body>
</html>
